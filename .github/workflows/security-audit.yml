name: security-audit

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/security-audit.yml
  schedule:
    - cron: "24 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
